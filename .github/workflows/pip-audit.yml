# Supply-chain: flag known CVEs in our Python dependencies on every push/PR and weekly.
name: pip-audit

on:
  push:
    paths: ["requirements.txt", ".github/workflows/pip-audit.yml"]
  pull_request:
    paths: ["requirements.txt"]
  schedule:
    - cron: "0 6 * * 1"   # Mondays — catch CVEs disclosed after we last shipped

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt --strict
