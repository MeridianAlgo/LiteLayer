<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteLayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0b0a14;
    --bg2:          #110f1e;
    --surface:      rgba(255,255,255,0.04);
    --surface-h:    rgba(255,255,255,0.07);
    --surface-a:    rgba(255,255,255,0.10);
    --border:       rgba(255,255,255,0.07);
    --border-h:     rgba(255,255,255,0.14);
    --accent:       #7c3aed;
    --accent2:      #4f46e5;
    --accent-glow:  rgba(124,58,237,0.35);
    --accent-light: #a78bfa;
    --green:        #10b981;
    --green-dim:    rgba(16,185,129,0.15);
    --yellow:       #f59e0b;
    --yellow-dim:   rgba(245,158,11,0.15);
    --red:          #ef4444;
    --red-dim:      rgba(239,68,68,0.15);
    --text:         #f0eeff;
    --text-2:       #9b8fcf;
    --text-3:       #5c5380;
    --radius:       14px;
    --radius-sm:    8px;
    --shadow:       0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

  /* ── Login ── */
  #view-login {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.18) 0%, transparent 70%),
                var(--bg);
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    padding: 40px 36px 36px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(24px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
    animation: fadeUp 0.4s ease;
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .login-logo svg { flex-shrink: 0; }

  .login-logo-text {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .login-sub {
    font-size: 13px;
    color: var(--text-3);
    margin-top: 1px;
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 2px 12px rgba(124,58,237,0.4);
  }
  .btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(124,58,237,0.55); }

  .btn-ghost {
    background: var(--surface);
    color: var(--text-2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-h); color: var(--text); border-color: var(--border-h); }

  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.25);
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .btn-sm { padding: 7px 13px; font-size: 12px; }
  .btn-full { width: 100%; margin-top: 8px; }

  .login-error {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--red-dim);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-size: 13px;
    display: none;
  }

  /* ── App shell ── */
  #view-app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    background: rgba(11,10,20,0.8);
    backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 16px;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 9px;
    text-decoration: none;
  }

  .topbar-logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.4px;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .topbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .topbar-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-2);
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .topbar-breadcrumb span { color: var(--text-3); }

  .topbar-breadcrumb a {
    color: var(--text-2);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
    cursor: pointer;
  }
  .topbar-breadcrumb a:hover { color: var(--text); }
  .topbar-breadcrumb .crumb-current { color: var(--text); font-weight: 500; }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px 5px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 13px;
    color: var(--text-2);
  }

  .user-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
  }

  /* ── Main content ── */
  .main { flex: 1; padding: 28px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* ── Section header ── */
  .section-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-hdr h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .section-hdr .count {
    font-size: 13px;
    color: var(--text-3);
    margin-left: 8px;
    font-weight: 400;
  }

  /* ── Drive cards ── */
  .drives-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .drive-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    cursor: default;
    animation: fadeUp 0.3s ease both;
  }

  .drive-card:hover {
    border-color: var(--border-h);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }

  .drive-card-header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  .drive-icon {
    width: 44px;
    height: 44px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(79,70,229,0.2));
    border: 1px solid rgba(124,58,237,0.2);
  }

  .drive-meta { flex: 1; min-width: 0; }

  .drive-label {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }

  .drive-device {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .fs-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    background: rgba(124,58,237,0.15);
    color: var(--accent-light);
    border: 1px solid rgba(124,58,237,0.2);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .drive-card-body { padding: 16px 20px; }

  .storage-bar-wrap { margin-bottom: 14px; }

  .storage-bar-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 7px;
  }

  .storage-bar-labels .used { color: var(--text); font-weight: 500; }

  .storage-bar-track {
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .storage-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .storage-bar-fill.warn { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .storage-bar-fill.crit { background: linear-gradient(90deg, #ef4444, #f87171); }

  .drive-card-footer {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }

  /* ── Status dot ── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    margin-bottom: 14px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.mounted_ro  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.mounted_rw  { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .status-dot.unmounted   { background: var(--text-3); }

  .status-label.mounted_ro  { color: var(--green); }
  .status-label.mounted_rw  { color: var(--yellow); }
  .status-label.unmounted   { color: var(--text-3); }

  /* ── File browser ── */
  #view-files { animation: fadeIn 0.25s ease; }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .path-display {
    flex: 1;
    min-width: 0;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text-2);
    font-family: 'SF Mono', 'Fira Code', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .view-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .view-toggle button {
    padding: 7px 10px;
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
  }
  .view-toggle button.active { background: var(--surface-a); color: var(--text); }
  .view-toggle button:hover:not(.active) { color: var(--text-2); }

  /* List view */
  .file-list { display: flex; flex-direction: column; gap: 2px; }

  .file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }
  .file-row:hover { background: var(--surface-h); border-color: var(--border); }

  .file-row-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }

  .file-row-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .file-row-size {
    font-size: 12px;
    color: var(--text-3);
    width: 80px;
    text-align: right;
    flex-shrink: 0;
  }

  .file-row-date {
    font-size: 12px;
    color: var(--text-3);
    width: 130px;
    text-align: right;
    flex-shrink: 0;
  }

  .file-row-dl {
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .file-row:hover .file-row-dl { opacity: 1; }

  /* Grid view */
  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }

  .file-cell {
    padding: 16px 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    text-align: center;
  }
  .file-cell:hover {
    background: var(--surface-h);
    border-color: var(--border-h);
    transform: translateY(-1px);
  }
  .file-cell-icon { font-size: 32px; line-height: 1; }
  .file-cell-name {
    font-size: 12px;
    font-weight: 500;
    word-break: break-all;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    color: var(--text-2);
  }
  .file-cell-size { font-size: 11px; color: var(--text-3); }

  /* Table header */
  .file-list-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 14px 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 14px;
    color: var(--text-3);
    font-size: 14px;
  }
  .empty-state svg { opacity: 0.3; }

  /* Toast */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
    pointer-events: none;
  }

  .toast {
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideIn 0.25s ease;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--green); }
  .toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: var(--red); }
  .toast.info    { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: var(--accent-light); }

  /* Loading spinner */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  /* Skeleton loaders */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface-h) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }

  /* Utility */
  .hidden { display: none !important; }
  .flex-1 { flex: 1; }

  /* Animations */
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp  { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* Responsive */
  @media (max-width: 600px) {
    .main { padding: 16px; }
    .topbar { padding: 0 16px; }
    .drives-grid { grid-template-columns: 1fr; }
    .file-row-date { display: none; }
  }
</style>
</head>
<body>

<!-- ══ Login View ══ -->
<div id="view-login" class="hidden">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="url(#lg1)"/>
        <path d="M10 24V16a2 2 0 012-2h3v10H10zm7 0V10h2a2 2 0 012 2v12h-4zm7 0v-6h-1v-2h1a2 2 0 012 2v6h-2z" fill="white" opacity="0.9"/>
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7c3aed"/>
            <stop offset="1" stop-color="#4f46e5"/>
          </linearGradient>
        </defs>
      </svg>
      <div>
        <div class="login-logo-text">LiteLayer</div>
        <div class="login-sub">Storage Backend</div>
      </div>
    </div>

    <div class="field">
      <label>Username</label>
      <input id="login-user" type="text" placeholder="admin" autocomplete="username" autocapitalize="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
      Sign In
    </button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<!-- ══ App View ══ -->
<div id="view-app" class="hidden">

  <!-- Top bar -->
  <header class="topbar">
    <a class="topbar-logo" href="#" onclick="showDrives(); return false;">
      <svg width="28" height="28" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="url(#lg2)"/>
        <path d="M10 24V16a2 2 0 012-2h3v10H10zm7 0V10h2a2 2 0 012 2v12h-4zm7 0v-6h-1v-2h1a2 2 0 012 2v6h-2z" fill="white" opacity="0.9"/>
        <defs>
          <linearGradient id="lg2" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#4f46e5"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="topbar-logo-text">LiteLayer</span>
    </a>

    <div class="topbar-sep"></div>

    <nav class="topbar-breadcrumb" id="breadcrumb">
      <a onclick="showDrives()">Drives</a>
    </nav>

    <div class="topbar-right">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">A</div>
        <span id="user-name">admin</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <!-- Drives view -->
    <div id="view-drives">
      <div class="section-hdr">
        <h2>Connected Drives <span class="count" id="drives-count"></span></h2>
        <button class="btn btn-ghost btn-sm" onclick="loadDrives()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
          </svg>
          Refresh
        </button>
      </div>
      <div class="drives-grid" id="drives-grid"></div>
    </div>

    <!-- File browser view -->
    <div id="view-files" class="hidden">
      <div class="files-toolbar">
        <button class="btn btn-ghost btn-sm" onclick="showDrives()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Drives
        </button>
        <div class="path-display" id="path-display">/</div>
        <div class="view-toggle">
          <button id="toggle-list" class="active" onclick="setView('list')" title="List view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
          <button id="toggle-grid" onclick="setView('grid')" title="Grid view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="files-container"></div>
    </div>

  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
const API = '';   // ponytail: empty = same origin; set to 'http://pi.local:8000' for remote dev

let currentDriveId = null;
let currentPath    = '/';
let fileView       = 'list';
let authToken      = null;

// ── Utils ──────────────────────────────────────────────────────────────────

function fmt(bytes) {
  if (bytes === 0) return '—';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (bytes >= 1024 && i < u.length - 1) { bytes /= 1024; i++; }
  return bytes.toFixed(i > 1 ? 1 : 0) + ' ' + u[i];
}

function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}

function fileIcon(name, isDir) {
  if (isDir) return '📁';
  const ext = name.split('.').pop().toLowerCase();
  const m = {
    jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️', heic:'🖼️', raw:'🖼️', tiff:'🖼️',
    mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬', wmv:'🎬', flv:'🎬', m4v:'🎬', webm:'🎬',
    mp3:'🎵', flac:'🎵', wav:'🎵', aac:'🎵', ogg:'🎵', m4a:'🎵', wma:'🎵',
    pdf:'📕', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📋', pptx:'📋',
    txt:'📄', md:'📄', log:'📄', csv:'📄', json:'📄', xml:'📄', yaml:'📄', yml:'📄',
    zip:'🗜️', tar:'🗜️', gz:'🗜️', '7z':'🗜️', rar:'🗜️', bz2:'🗜️', xz:'🗜️',
    dmg:'💿', iso:'💿', img:'💿',
    app:'⚙️', exe:'⚙️', deb:'⚙️', rpm:'⚙️', apk:'⚙️',
    py:'🐍', js:'📜', ts:'📜', html:'🌐', css:'🎨', sh:'⚡', rb:'💎', go:'🐹', rs:'🦀', c:'⚙️', cpp:'⚙️',
  };
  return m[ext] || '📄';
}

function show(id)  { document.getElementById(id).classList.remove('hidden'); }
function hide(id)  { document.getElementById(id).classList.add('hidden'); }

function toast(msg, type = 'info', dur = 3500) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  el.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, dur);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const r = await fetch(API + path, { ...opts, headers, credentials: 'include' });
  if (r.status === 401) { showLogin(); return null; }
  return r;
}

// ── Auth ───────────────────────────────────────────────────────────────────

async function checkAuth() {
  try {
    const r = await fetch(API + '/api/me', { credentials: 'include' });
    if (r.ok) {
      const d = await r.json();
      setUser(d.username);
      showApp();
      loadDrives();
      return;
    }
  } catch {}
  showLogin();
}

function setUser(username) {
  document.getElementById('user-name').textContent = username;
  document.getElementById('user-avatar').textContent = username[0].toUpperCase();
}

function showLogin() {
  hide('view-app');
  show('view-login');
  setTimeout(() => document.getElementById('login-user').focus(), 50);
}

function showApp() {
  hide('view-login');
  show('view-app');
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('login-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-pass').focus();
});

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) { err.textContent = 'Enter username and password.'; err.style.display = 'block'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in…';
  err.style.display = 'none';

  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Login failed');
    authToken = data.token;
    setUser(username);
    showApp();
    loadDrives();
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function doLogout() {
  await api('/api/logout', { method: 'POST' });
  authToken = null;
  showLogin();
  toast('Signed out', 'info', 2000);
}

// ── Drives ─────────────────────────────────────────────────────────────────

async function loadDrives() {
  const grid = document.getElementById('drives-grid');
  grid.innerHTML = '<div class="skeleton" style="height:160px;border-radius:14px"></div>'.repeat(3);

  const r = await api('/api/drives');
  if (!r) return;
  const drives = await r.json();

  document.getElementById('drives-count').textContent = `${drives.length} drive${drives.length !== 1 ? 's' : ''}`;

  if (drives.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 5v14c0 1.66-4.03 3-9 3S3 20.66 3 19V5"/>
        <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
      </svg>
      <div>No external drives detected</div>
      <div style="font-size:12px">Plug in a USB drive and click Refresh</div>
    </div>`;
    return;
  }

  grid.innerHTML = drives.map((d, i) => driveCard(d, i)).join('');
}

function driveCard(d, i) {
  const used   = d.used_bytes || 0;
  const total  = d.size_bytes || 1;
  const pct    = total > 0 ? Math.round(used / total * 100) : 0;
  const barCls = pct > 90 ? 'crit' : pct > 75 ? 'warn' : '';
  const mounted = d.state !== 'unmounted';

  const fsColors = {
    ntfs:'#60a5fa', exfat:'#34d399', vfat:'#f472b6', fat32:'#f472b6',
    ext4:'#a78bfa', ext3:'#a78bfa', btrfs:'#fb923c', xfs:'#facc15',
    hfsplus:'#94a3b8', 'iso9660':'#94a3b8',
  };
  const fsColor = fsColors[d.fstype.toLowerCase()] || '#a78bfa';

  const stateLabel = { mounted_ro:'Mounted (read-only)', mounted_rw:'Mounted (read-write)', unmounted:'Not mounted' };
  const stateCls   = d.state;

  return `
  <div class="drive-card" style="animation-delay:${i * 60}ms">
    <div class="drive-card-header">
      <div class="drive-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 5v14c0 1.66-4.03 3-9 3S3 20.66 3 19V5"/>
          <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
        </svg>
      </div>
      <div class="drive-meta">
        <div class="drive-label" title="${esc(d.label)}">${esc(d.label)}</div>
        <div class="drive-device">${esc(d.device)}</div>
      </div>
      <div class="fs-badge" style="background:${fsColor}18;color:${fsColor};border-color:${fsColor}33">
        ${esc(d.fstype)}
      </div>
    </div>

    <div class="drive-card-body">
      <div class="status-row">
        <div class="status-dot ${stateCls}"></div>
        <span class="status-label ${stateCls}" style="font-size:12px;font-weight:500">${stateLabel[d.state] || d.state}</span>
      </div>

      <div class="storage-bar-wrap">
        <div class="storage-bar-labels">
          <span class="used">${fmt(used)} used</span>
          <span>${fmt(d.free_bytes)} free · ${fmt(total)}</span>
        </div>
        <div class="storage-bar-track">
          <div class="storage-bar-fill ${barCls}" style="width:${mounted ? pct : 0}%"></div>
        </div>
      </div>
    </div>

    <div class="drive-card-footer">
      ${mounted
        ? `<button class="btn btn-ghost btn-sm flex-1" onclick="browseFiles('${esc(d.id)}','${esc(d.label)}')">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
             Browse
           </button>
           <button class="btn btn-ghost btn-sm" onclick="unmountDrive('${esc(d.id)}')">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 9l6 6m0-6l-6 6"/><circle cx="12" cy="12" r="9"/></svg>
             Eject
           </button>`
        : `<button class="btn btn-primary btn-sm flex-1" onclick="mountDrive('${esc(d.id)}')">
             <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
             Mount
           </button>`
      }
    </div>
  </div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function mountDrive(id) {
  toast('Mounting…', 'info', 1500);
  const r = await api(`/api/drives/${id}/mount`, { method: 'POST' });
  if (!r) return;
  if (r.ok) { toast('Drive mounted', 'success'); loadDrives(); }
  else { const d = await r.json(); toast(d.detail || 'Mount failed', 'error', 5000); }
}

async function unmountDrive(id) {
  toast('Ejecting…', 'info', 1500);
  const r = await api(`/api/drives/${id}/unmount`, { method: 'POST' });
  if (!r) return;
  if (r.ok) { toast('Drive ejected safely', 'success'); showDrives(); loadDrives(); }
  else { const d = await r.json(); toast(d.detail || 'Unmount failed', 'error', 5000); }
}

// ── File browser ────────────────────────────────────────────────────────────

function showDrives() {
  currentDriveId = null;
  currentPath = '/';
  show('view-drives');
  hide('view-files');
  setBreadcrumb([]);
}

function browseFiles(driveId, driveLabel) {
  currentDriveId = driveId;
  currentPath = '/';
  hide('view-drives');
  show('view-files');
  loadFiles('/');
  setBreadcrumb([{ label: driveLabel, path: '/', driveId }]);
}

function setBreadcrumb(crumbs) {
  const nav = document.getElementById('breadcrumb');
  if (!crumbs.length) {
    nav.innerHTML = `<a onclick="showDrives()">Drives</a>`;
    return;
  }
  const parts = [`<a onclick="showDrives()">Drives</a>`];
  crumbs.forEach((c, i) => {
    parts.push(`<span>›</span>`);
    if (i < crumbs.length - 1) {
      parts.push(`<a onclick="loadFiles('${esc(c.path)}')">${esc(c.label)}</a>`);
    } else {
      parts.push(`<span class="crumb-current">${esc(c.label)}</span>`);
    }
  });
  nav.innerHTML = parts.join('');
}

async function loadFiles(path) {
  currentPath = path;
  document.getElementById('path-display').textContent = path;

  const container = document.getElementById('files-container');
  container.innerHTML = '<div class="skeleton" style="height:40px;margin-bottom:2px;border-radius:8px"></div>'.repeat(6);

  const r = await api(`/api/files?drive=${currentDriveId}&path=${encodeURIComponent(path)}`);
  if (!r) return;

  if (!r.ok) {
    const d = await r.json();
    toast(d.detail || 'Failed to load directory', 'error');
    container.innerHTML = `<div class="empty-state">${d.detail || 'Error loading files'}</div>`;
    return;
  }

  const data = await r.json();
  renderFiles(data.entries, path);
}

function renderFiles(entries, path) {
  const container = document.getElementById('files-container');

  if (!entries.length) {
    container.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
      </svg>
      <div>Empty folder</div>
    </div>`;
    return;
  }

  if (fileView === 'list') {
    container.innerHTML = `
      <div class="file-list-header">
        <div style="width:28px"></div>
        <div class="flex-1">Name</div>
        <div style="width:80px;text-align:right">Size</div>
        <div style="width:130px;text-align:right">Modified</div>
        <div style="width:32px"></div>
      </div>
      <div class="file-list">
        ${path !== '/' ? `
        <div class="file-row" onclick="navigateUp()">
          <div class="file-row-icon">⬆️</div>
          <div class="file-row-name" style="color:var(--text-2)">..</div>
          <div class="file-row-size"></div>
          <div class="file-row-date"></div>
          <div class="file-row-dl"></div>
        </div>` : ''}
        ${entries.map(e => `
        <div class="file-row" onclick="${e.is_dir ? `openDir('${esc(e.path)}','${esc(e.name)}')` : `downloadFile('${esc(e.path)}','${esc(e.name)}')`}">
          <div class="file-row-icon">${fileIcon(e.name, e.is_dir)}</div>
          <div class="file-row-name" title="${esc(e.name)}">${esc(e.name)}</div>
          <div class="file-row-size">${e.is_dir ? '—' : fmt(e.size_bytes)}</div>
          <div class="file-row-date">${fmtDate(e.modified)}</div>
          <div class="file-row-dl">
            ${!e.is_dir ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();downloadFile('${esc(e.path)}','${esc(e.name)}')" title="Download">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>` : ''}
          </div>
        </div>`).join('')}
      </div>`;
  } else {
    container.innerHTML = `
      <div class="file-grid">
        ${path !== '/' ? `
        <div class="file-cell" onclick="navigateUp()">
          <div class="file-cell-icon">⬆️</div>
          <div class="file-cell-name">..</div>
          <div class="file-cell-size"></div>
        </div>` : ''}
        ${entries.map(e => `
        <div class="file-cell" onclick="${e.is_dir ? `openDir('${esc(e.path)}','${esc(e.name)}')` : `downloadFile('${esc(e.path)}','${esc(e.name)}')`}" title="${esc(e.name)}">
          <div class="file-cell-icon">${fileIcon(e.name, e.is_dir)}</div>
          <div class="file-cell-name">${esc(e.name)}</div>
          <div class="file-cell-size">${e.is_dir ? '' : fmt(e.size_bytes)}</div>
        </div>`).join('')}
      </div>`;
  }
}

function openDir(path, name) {
  // Build breadcrumb segments
  const nav = document.getElementById('breadcrumb');
  const crumbLinks = nav.querySelectorAll('a');
  const driveLabel = crumbLinks[1] ? crumbLinks[1].textContent : 'Drive';
  // Just re-derive from current path segments
  const segments = path.split('/').filter(Boolean);
  const crumbs = [{ label: driveLabel, path: '/', driveId: currentDriveId }];
  let built = '';
  segments.forEach((seg, i) => {
    built += '/' + seg;
    crumbs.push({ label: seg, path: built });
  });
  setBreadcrumb(crumbs);
  loadFiles(path);
}

function navigateUp() {
  const parts = currentPath.split('/').filter(Boolean);
  if (parts.length === 0) return;
  parts.pop();
  const parent = parts.length ? '/' + parts.join('/') : '/';
  const name   = parts.length ? parts[parts.length - 1] : 'Drive';
  openDir(parent, name);
}

function downloadFile(path, name) {
  const url = `${API}/api/files/download?drive=${currentDriveId}&path=${encodeURIComponent(path)}`;
  // Create a hidden link and click it so the browser handles the download
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  // Append Authorization header workaround: use fetch + blob for Bearer token mode
  if (authToken) {
    toast(`Downloading ${name}…`, 'info', 2000);
    fetch(url, { headers: { Authorization: `Bearer ${authToken}` }, credentials: 'include' })
      .then(r => r.blob())
      .then(blob => {
        const burl = URL.createObjectURL(blob);
        const dl = document.createElement('a');
        dl.href = burl;
        dl.download = name;
        dl.click();
        setTimeout(() => URL.revokeObjectURL(burl), 10000);
      })
      .catch(() => toast('Download failed', 'error'));
    return;
  }
  document.body.appendChild(a);
  a.click();
  a.remove();
  toast(`Downloading ${name}…`, 'info', 2000);
}

function setView(v) {
  fileView = v;
  document.getElementById('toggle-list').classList.toggle('active', v === 'list');
  document.getElementById('toggle-grid').classList.toggle('active', v === 'grid');
  if (currentDriveId) loadFiles(currentPath);
}

// ── Boot ────────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
